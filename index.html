<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiveM Minigame - With Sound Effects</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none; 
        }

        .game-container {
            position: relative;
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #222;
            border-radius: 12px;
            padding: 40px 30px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(20, 20, 20, 0.95);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        .overlay h2 {
            margin: 0 0 10px;
            color: #ffaa00;
            font-size: 24px;
        }
        .overlay p {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .btn {
            background-color: #ffaa00;
            color: #111;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover {
            background-color: #ffc44d;
            transform: scale(1.05);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            font-size: 18px;
            font-weight: bold;
        }
        .status-bar .score { color: #2778ff; font-size: 22px; }

        .circle-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }
        svg {
            transform: rotate(-90deg); 
            width: 100%;
            height: 100%;
            overflow: visible;
        }
        .track {
            fill: none;
            stroke: #34363d; 
            stroke-width: 20;
        }
        .target-zone {
            fill: none;
            stroke: #2778ff; 
            stroke-width: 20;
            stroke-linecap: butt;
            transform-origin: 100px 100px; 
        }
        
        .pointer-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            transform-origin: center;
            will-change: transform;
        }
        .pointer {
            position: absolute;
            top: 4px; 
            left: 50%;
            width: 5px;
            height: 32px; 
            background-color: #ff3b30;
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .center-key-box {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: #34363d; 
            width: 48px;
            height: 48px;
            border-radius: 10px; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            font-weight: bold;
            color: #ececec;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .alert-text {
            margin-top: 25px;
            height: 20px;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="overlay" id="overlay">
            <h2 id="overlay-title">ติดตั้งอุปกรณ์</h2>
            <p id="overlay-desc">กดให้ตรงขีดสีฟ้า และถูกปุ่ม (W A S D)<br>ต่อเนื่อง 10 ครั้ง ห้ามพลาด!</p>
            <button class="btn" id="start-btn" onclick="startGame()">เริ่มทำรายการ</button>
        </div>

        <div class="status-bar">
            <span>สำเร็จ:</span>
            <span class="score"><span id="score-text">0</span> / 10</span>
        </div>
        
        <div class="circle-wrapper">
            <svg viewBox="0 0 200 200">
                <circle class="track" cx="100" cy="100" r="80"></circle>
                <circle class="target-zone" id="target" cx="100" cy="100" r="80"></circle>
            </svg>
            <div class="pointer-container" id="pointer">
                <div class="pointer"></div>
            </div>
            <div class="center-key-box" id="center-key">W</div>
        </div>

        <div class="alert-text" id="alert-text"></div>
    </div>

    <script>
        // --- ระบบเสียงสังเคราะห์ (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'success') {
                // เสียง "ติ๊ง!" (โดนเป้า)
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // โน้ต A5
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'fail') {
                // เสียง "ออดด!" (พลาด)
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'win') {
                // เสียงตอนชนะ
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime + 0.2); // A5
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.5);
            }
        }

        // --- ระบบเกม ---
        const keys = ['W', 'A', 'S', 'D'];
        const totalRounds = 10; 

        const timePerRevolution = 1100; 
        const hitBuffer = 8; 

        let score = 0;
        let isPlaying = false;
        let animationFrame;
        let startTime = 0;
        let currentAngle = 0;
        let targetStartAngle = 0;
        let targetEndAngle = 0;
        let currentTargetKey = '';

        const radius = 80;
        const circumference = 2 * Math.PI * radius; 

        const targetEl = document.getElementById('target');
        const pointerEl = document.getElementById('pointer');
        const centerKeyEl = document.getElementById('center-key');
        const scoreText = document.getElementById('score-text');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const startBtn = document.getElementById('start-btn');
        const alertText = document.getElementById('alert-text');

        function startGame() {
            // อนุญาตให้เบราว์เซอร์เล่นเสียงได้
            if (audioCtx.state === 'suspended') audioCtx.resume();

            overlay.style.display = 'none';
            score = 0;
            scoreText.textContent = score;
            alertText.textContent = '';
            targetEl.style.stroke = '#2778ff'; 
            
            startRound();
        }

        function startRound() {
            if (score >= totalRounds) {
                playSound('win'); // เล่นเสียงชนะ
                endGame(true, "ติดตั้งสำเร็จ!");
                return;
            }

            currentTargetKey = keys[Math.floor(Math.random() * keys.length)];
            centerKeyEl.textContent = currentTargetKey;

            const targetWidthDegrees = Math.floor(Math.random() * 15) + 40; 
            const minStartAngle = 120; 
            const maxStartAngle = 360 - targetWidthDegrees - 15; 

            targetStartAngle = Math.floor(Math.random() * (maxStartAngle - minStartAngle)) + minStartAngle;
            targetEndAngle = targetStartAngle + targetWidthDegrees;

            const targetLength = (targetWidthDegrees / 360) * circumference;
            targetEl.style.strokeDasharray = `${targetLength} ${circumference}`;
            targetEl.style.strokeDashoffset = `0`;
            targetEl.style.transform = `rotate(${targetStartAngle}deg)`;

            currentAngle = 0;
            pointerEl.style.transform = `rotate(0deg)`;
            targetEl.style.stroke = '#2778ff';
            
            isPlaying = true;
            startTime = performance.now();
            
            cancelAnimationFrame(animationFrame);
            animationFrame = requestAnimationFrame(update);
        }

        function update(currentTime) {
            if (!isPlaying) return;

            const elapsedTime = currentTime - startTime;
            currentAngle = (elapsedTime / timePerRevolution) * 360;

            if (currentAngle >= 360) {
                currentAngle = 360;
                pointerEl.style.transform = `rotate(360deg)`;
                playSound('fail'); // เล่นเสียงพลาด
                handleFail("พลาด! หมดเวลา");
                return;
            }

            pointerEl.style.transform = `rotate(${currentAngle}deg)`;
            animationFrame = requestAnimationFrame(update);
        }

        document.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            
            // ระบบแปลคีย์ไทย
            const thaiToEngMap = {
                'ไ': 'W', 'ฟ': 'A', 'ห': 'S', 'ก': 'D',
                '"': 'W', 'ฤ': 'A', 'ฆ': 'S', 'ฏ': 'D' 
            };

            let pressedKey = e.key;
            if (thaiToEngMap[pressedKey]) {
                pressedKey = thaiToEngMap[pressedKey];
            } else {
                pressedKey = pressedKey.toUpperCase();
            }

            if (!keys.includes(pressedKey)) return;

            isPlaying = false;
            cancelAnimationFrame(animationFrame);

            const exactClickTime = performance.now();
            currentAngle = ((exactClickTime - startTime) / timePerRevolution) * 360;
            if (currentAngle > 360) currentAngle = 360;

            pointerEl.style.transform = `rotate(${currentAngle}deg)`;

            const isInsideZone = currentAngle >= (targetStartAngle - hitBuffer) && currentAngle <= (targetEndAngle + hitBuffer);
            const isCorrectKey = pressedKey === currentTargetKey;

            if (isInsideZone && isCorrectKey) {
                playSound('success'); // เล่นเสียงกดถูก
                score++;
                scoreText.textContent = score;
                targetEl.style.stroke = '#00ff44'; 

                setTimeout(() => {
                    startRound();
                }, 150);

            } else {
                playSound('fail'); // เล่นเสียงพลาด
                if (!isInsideZone) {
                    handleFail("พลาด! หยุดตรงสีเทา");
                } else {
                    handleFail(`พลาด! กดผิดปุ่ม (ต้องกด ${currentTargetKey})`);
                }
            }
        });

        function handleFail(reason) {
            isPlaying = false;
            cancelAnimationFrame(animationFrame);
            
            targetEl.style.stroke = '#ff3b30'; 
            
            setTimeout(() => {
                endGame(false, reason);
            }, 500); 
        }

        function endGame(isWin, message) {
            overlay.style.display = 'flex';
            overlayTitle.innerHTML = isWin ? "🎉 สำเร็จ!" : "❌ ล้มเหลว!";
            overlayTitle.style.color = isWin ? '#00ff44' : '#ff3b30';
            overlayDesc.textContent = isWin ? "ติดตั้งอุปกรณ์เรียบร้อยแล้ว" : message;
            startBtn.textContent = isWin ? "เล่นอีกครั้ง" : "ลองใหม่";
        }
    </script>
</body>
</html>
